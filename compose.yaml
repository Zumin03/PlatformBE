services:

  db:
    image: postgres
    restart: always
    shm_size: 128mb
    ports:
      - 5432:5432
    environment:
      POSTGRES_PASSWORD: Nemezajelszo1
      POSTGRES_USER: boszm
      POSTGRES_DB: platformdb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U boszm -d platformdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  # adminer:
    # image: adminer
    # restart: always
    # ports:
      # - 8080:8090

  fe:
    build:
      context: Frontend
    restart: always
    ports:
      - 80:80 
    extra_hosts:
      - "host.docker.internal:host-gateway"